<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentBridge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>AgentBridge</h1>
    <button id="refresh">Read Page</button>

    <section>
      <h2>Page</h2>
      <pre id="pageData"></pre>
    </section>

    <section>
      <h2>Workflow</h2>
      <input id="wfName" placeholder="workflow name" />
      <textarea id="wfJson" placeholder='{"field":"email","value":"a@b.com"}'></textarea>
      <div class="row">
        <button id="saveWf">Save</button>
        <button id="loadWf">Load</button>
        <button id="runWf">Run</button>
      </div>
      <pre id="wfStatus"></pre>
    </section>

    <script src="sidepanel.js"></script>
  </body>
</html>
